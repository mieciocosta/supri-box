<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>SupriBox · sua dose diária de surpresa</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --night-1:#1b1230;      /* fundo profundo */
    --night-2:#2a1a4a;
    --gold:#e8b95e;         /* fita / brilho */
    --gold-soft:#f6d99a;
    --coral:#ff7a6b;        /* energia */
    --mint:#6fe3c4;         /* serenidade fresca */
    --cream:#f7f1e6;        /* texto claro */
    --ink:#15102a;
    --muted:#b9add6;
    --card:#fbf7ef;
    --radius:22px;
    --ease:cubic-bezier(.22,1,.36,1);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"DM Sans",system-ui,sans-serif;
    color:var(--cream);
    background:
      radial-gradient(120% 90% at 50% -10%, #3a2566 0%, var(--night-2) 38%, var(--night-1) 78%);
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    overflow-x:hidden;
    padding:max(18px,env(safe-area-inset-top)) 18px max(22px,env(safe-area-inset-bottom));
    -webkit-tap-highlight-color:transparent;
  }

  /* estrelinhas ambiente */
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.7}
  .stars i{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;opacity:.0;
    animation:twinkle 4s var(--ease) infinite}
  @keyframes twinkle{0%,100%{opacity:0;transform:scale(.6)}50%{opacity:.65;transform:scale(1)}}

  .shell{width:100%;max-width:440px;position:relative;z-index:1;
    display:flex;flex-direction:column;flex:1;gap:22px}

  header{text-align:center;padding-top:8px}
  .kicker{font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:600}
  h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(30px,9vw,40px);
    line-height:1.02;margin-top:8px;color:var(--cream)}
  h1 em{font-style:italic;color:var(--gold-soft)}
  .sub{color:var(--muted);font-size:14.5px;margin-top:10px;line-height:1.45}

  /* seletor de vibe */
  .vibes{display:flex;gap:8px;background:rgba(255,255,255,.06);padding:6px;border-radius:16px;
    border:1px solid rgba(255,255,255,.08)}
  .vibe{flex:1;border:0;background:transparent;color:var(--muted);font-family:inherit;
    font-weight:600;font-size:13px;padding:11px 4px;border-radius:11px;cursor:pointer;
    transition:.25s var(--ease);display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1}
  .vibe span{font-size:18px}
  .vibe small{font-size:10.5px;font-weight:500;opacity:.75;letter-spacing:.02em}
  .vibe[aria-pressed="true"]{background:var(--cream);color:var(--ink);box-shadow:0 6px 18px rgba(0,0,0,.28)}
  .vibe[aria-pressed="true"] small{opacity:.6}

  /* palco */
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;min-height:300px}

  /* a caixinha */
  .box-wrap{position:relative;width:172px;height:160px;cursor:pointer;
    animation:float 4.5s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .glow{position:absolute;inset:-40% -30%;border-radius:50%;z-index:0;
    background:radial-gradient(circle, color-mix(in srgb,var(--accent) 60%, transparent) 0%, transparent 62%);
    filter:blur(14px);opacity:.55;transition:.4s var(--ease)}
  .box{position:absolute;left:26px;bottom:0;width:120px;height:96px;border-radius:10px;z-index:2;
    background:linear-gradient(160deg,#fdfaf3,#ece2cf);
    box-shadow:0 22px 40px -14px rgba(0,0,0,.55), inset 0 -8px 14px rgba(0,0,0,.06)}
  .box::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:22px;transform:translateX(-50%);
    background:linear-gradient(var(--accent),color-mix(in srgb,var(--accent) 70%,#000 8%))}
  .lid{position:absolute;left:18px;top:34px;width:136px;height:40px;border-radius:9px;z-index:3;
    background:linear-gradient(160deg,#fffdf8,#f0e7d6);
    box-shadow:0 10px 22px -8px rgba(0,0,0,.5);
    transition:transform .55s var(--ease),opacity .5s var(--ease);transform-origin:center bottom}
  .lid::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:24px;transform:translateX(-50%);
    background:linear-gradient(var(--accent),color-mix(in srgb,var(--accent) 70%,#000 8%))}
  .bow{position:absolute;left:50%;top:18px;width:54px;height:34px;transform:translateX(-50%);z-index:4;
    transition:transform .55s var(--ease),opacity .45s var(--ease)}
  .bow::before,.bow::after{content:"";position:absolute;top:0;width:26px;height:34px;
    border-radius:60% 60% 50% 50%;background:var(--accent);
    box-shadow:inset 0 -6px 8px rgba(0,0,0,.12)}
  .bow::before{left:0;transform:rotate(-22deg)}
  .bow::after{right:0;transform:rotate(22deg)}

  .tap-hint{margin-top:26px;color:var(--muted);font-size:13.5px;letter-spacing:.04em;
    display:flex;align-items:center;gap:7px}
  .tap-hint b{color:var(--cream);font-weight:600}

  /* estados de abertura */
  .box-wrap.opening{animation:shake .42s var(--ease)}
  @keyframes shake{0%,100%{transform:translateY(0) rotate(0)}20%{transform:translateY(-3px) rotate(-3deg)}
    40%{transform:translateY(-3px) rotate(3deg)}60%{transform:translateY(-3px) rotate(-2deg)}
    80%{transform:translateY(-3px) rotate(2deg)}}
  .box-wrap.open .lid{transform:translateY(-72px) rotate(-12deg);opacity:0}
  .box-wrap.open .bow{transform:translate(-50%,-90px) scale(.6);opacity:0}
  .box-wrap.open .glow{opacity:1;inset:-70% -55%}

  /* card revelado */
  .reveal{position:relative;z-index:5;width:100%;max-width:360px;background:var(--card);color:var(--ink);
    border-radius:var(--radius);padding:34px 28px 30px;text-align:center;
    box-shadow:0 30px 70px -22px rgba(0,0,0,.6);
    opacity:0;transform:translateY(26px) scale(.96);pointer-events:none;
    transition:opacity .5s var(--ease) .15s, transform .6s var(--ease) .15s;
    display:none}
  .reveal.show{display:block;opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
  .reveal .tag{display:inline-block;font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    font-weight:700;color:var(--accent-ink);background:color-mix(in srgb,var(--accent) 18%,#fff);
    padding:6px 12px;border-radius:20px;margin-bottom:18px}
  .reveal .body{font-family:"Fraunces",serif;font-size:24px;line-height:1.34;font-weight:500;color:#241a3d}
  .reveal.tipo-frase .body{font-family:"DM Sans",sans-serif;font-weight:700;font-size:23px;line-height:1.3}
  .reveal.tipo-vibe{background:linear-gradient(150deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#7b3ff2))}
  .reveal.tipo-vibe .body,.reveal.tipo-vibe .ref{color:#fff}
  .reveal.tipo-vibe .tag{background:rgba(255,255,255,.22);color:#fff}
  .reveal .emoji{font-size:48px;display:block;margin-bottom:14px}
  .reveal .ref{margin-top:16px;font-size:13px;font-weight:600;color:#6b5f86;letter-spacing:.02em}

  .actions{display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:4px}
  .btn{border:0;font-family:inherit;font-weight:700;font-size:16px;cursor:pointer;
    padding:16px 26px;border-radius:16px;width:100%;max-width:360px;transition:.2s var(--ease)}
  .btn-primary{background:var(--accent);color:var(--ink);box-shadow:0 14px 30px -10px color-mix(in srgb,var(--accent) 70%,transparent)}
  .btn-primary:active{transform:translateY(2px)}
  .btn-ghost{background:transparent;color:var(--cream);border:1px solid rgba(255,255,255,.16);max-width:360px}
  .btn-ghost:active{transform:translateY(2px)}

  footer{text-align:center;color:var(--muted);font-size:13px;line-height:1.5;padding-top:4px}
  footer b{color:var(--gold-soft);font-weight:600}
  .wa{color:var(--mint);text-decoration:none;font-weight:600}

  /* sparkles do estouro */
  .spark{position:absolute;left:50%;top:46%;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:6;opacity:0}
  .burst .spark{animation:fly .7s var(--ease) forwards}
  @keyframes fly{0%{opacity:1;transform:translate(0,0) scale(1)}
    100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.2)}}

  @media (prefers-reduced-motion: reduce){
    .box-wrap,.stars i{animation:none!important}
    .reveal{transition:opacity .2s linear}
    .box-wrap.open .lid,.box-wrap.open .bow{transition:opacity .2s linear}
    .spark{display:none}
  }
</style>
</head>
<body data-vibe="serenidade">
  <div class="stars" id="stars" aria-hidden="true"></div>

  <div class="shell">
    <header>
      <div class="kicker">SupriBox</div>
      <h1>Uma <em>surpresa</em><br>boa por dia</h1>
      <p class="sub">Escolha sua vibe e abra. Cada caixinha guarda algo feito pra te levantar.</p>
    </header>

    <div class="vibes" role="group" aria-label="Escolha a vibe">
      <button class="vibe" data-vibe="serenidade" aria-pressed="true">
        <span>🕊️</span>Serenidade<small>versículos & paz</small>
      </button>
      <button class="vibe" data-vibe="equilibrio" aria-pressed="false">
        <span>🌿</span>Dia a dia<small>equilíbrio</small>
      </button>
      <button class="vibe" data-vibe="energia" aria-pressed="false">
        <span>⚡</span>Energia<small>frases & vibe</small>
      </button>
    </div>

    <div class="stage" id="stage">
      <div class="box-wrap" id="box" role="button" tabindex="0" aria-label="Abrir caixinha">
        <div class="glow"></div>
        <div class="box"></div>
        <div class="lid"></div>
        <div class="bow"></div>
      </div>
      <div class="tap-hint" id="hint">toque na caixinha · <b>é surpresa ✨</b></div>

      <div class="reveal" id="reveal" aria-live="polite">
        <span class="tag" id="rTag">Versículo</span>
        <span class="emoji" id="rEmoji" style="display:none"></span>
        <div class="body" id="rBody"></div>
        <div class="ref" id="rRef"></div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="openBtn">Abrir caixinha</button>
      <button class="btn btn-ghost" id="againBtn" style="display:none">Abrir outra</button>
    </div>

    <footer>
      Gostou? <b>Receba sua caixinha todo dia</b> direto no
      <a class="wa" href="#" id="wa">WhatsApp →</a>
    </footer>
  </div>

<script>
/* ============================================================
   CONFIG — aponte para o backend pra puxar do banco real.
   Deixe vazio ("") pra rodar 100% offline com o acervo local.
============================================================ */
const API_BASE = ""; // ex: "https://caixinha-backend.up.railway.app"

/* mapa vibe(UI) -> perfil(motor) */
const PERFIL = { serenidade:"idoso", equilibrio:"adulto", energia:"jovem" };

/* paleta de acento por vibe */
const ACENTO = {
  serenidade:{accent:"#6fe3c4", ink:"#0f5446"},
  equilibrio:{accent:"#e8b95e", ink:"#7a5410"},
  energia:{accent:"#ff7a6b", ink:"#8a2a1f"}
};

/* ------------------------------------------------------------
   ACERVO LOCAL (demo offline). Os pesos definem a chance por
   perfil: {idoso, adulto, jovem}. 0 = não aparece pra aquele perfil.
   No backend isso vem do banco (seed.js) e é fácil de expandir.
------------------------------------------------------------ */
const ACERVO = [
  // versículos (domínio público) — fortes pra "serenidade"
  {tipo:"versiculo", texto:"O Senhor é o meu pastor; nada me faltará.", ref:"Salmos 23:1", pesos:{idoso:6,adulto:3,jovem:1}},
  {tipo:"versiculo", texto:"Tudo posso naquele que me fortalece.", ref:"Filipenses 4:13", pesos:{idoso:5,adulto:4,jovem:3}},
  {tipo:"versiculo", texto:"O choro pode durar uma noite, mas a alegria vem pela manhã.", ref:"Salmos 30:5", pesos:{idoso:6,adulto:3,jovem:1}},
  {tipo:"versiculo", texto:"Lançando sobre ele toda a vossa ansiedade, porque ele tem cuidado de vós.", ref:"1 Pedro 5:7", pesos:{idoso:6,adulto:4,jovem:2}},
  {tipo:"versiculo", texto:"Não temas, porque eu sou contigo.", ref:"Isaías 41:10", pesos:{idoso:6,adulto:4,jovem:2}},
  {tipo:"versiculo", texto:"A tua palavra é lâmpada para os meus pés e luz para o meu caminho.", ref:"Salmos 119:105", pesos:{idoso:5,adulto:3,jovem:1}},
  {tipo:"versiculo", texto:"Entrega o teu caminho ao Senhor; confia nele, e ele tudo fará.", ref:"Salmos 37:5", pesos:{idoso:5,adulto:4,jovem:2}},
  // carinho / bom dia — serenidade + equilíbrio
  {tipo:"frase", texto:"Bom dia. Que hoje seja leve e cheio de pequenas alegrias.", ref:"", pesos:{idoso:5,adulto:3,jovem:1}},
  {tipo:"frase", texto:"Você é mais forte do que imagina e mais amado do que pensa.", ref:"", pesos:{idoso:4,adulto:4,jovem:3}},
  // frases motivacionais (originais) — fortes pra "energia"
  {tipo:"frase", texto:"Você não precisa ter tudo pronto pra começar. Só precisa começar.", ref:"", pesos:{idoso:1,adulto:4,jovem:6}},
  {tipo:"frase", texto:"Sua única competição é a pessoa que você foi ontem.", ref:"", pesos:{idoso:1,adulto:4,jovem:6}},
  {tipo:"frase", texto:"Coragem não é ausência de medo. É seguir mesmo sentindo ele.", ref:"", pesos:{idoso:2,adulto:5,jovem:5}},
  {tipo:"frase", texto:"Disciplina é amor próprio em forma de hábito.", ref:"", pesos:{idoso:1,adulto:4,jovem:6}},
  {tipo:"frase", texto:"Respira. Você já superou 100% dos seus piores dias.", ref:"", pesos:{idoso:2,adulto:5,jovem:6}},
  // "vibe" — card vibrante com emoji, exclusivo pra galera jovem
  {tipo:"vibe", emoji:"🚀", texto:"Modo foco ativado. Hoje é dia de avançar.", ref:"", pesos:{idoso:0,adulto:2,jovem:6}},
  {tipo:"vibe", emoji:"🔥", texto:"Some o orgulho do depois. Faz o que tem que ser feito agora.", ref:"", pesos:{idoso:0,adulto:2,jovem:6}},
  {tipo:"vibe", emoji:"🌱", texto:"Plante hoje a sombra onde você vai descansar amanhã.", ref:"", pesos:{idoso:1,adulto:3,jovem:5}},
  {tipo:"vibe", emoji:"💪", texto:"Dias difíceis constroem pessoas inquebráveis.", ref:"", pesos:{idoso:1,adulto:3,jovem:6}}
];

/* sorteio ponderado por perfil, evitando repetir o último */
let ultimoTexto = null;
function sortearLocal(perfil){
  const elegiveis = ACERVO.filter(c => (c.pesos[perfil]||0) > 0 && c.texto !== ultimoTexto);
  const pool = elegiveis.length ? elegiveis : ACERVO.filter(c => (c.pesos[perfil]||0) > 0);
  const total = pool.reduce((s,c)=>s+c.pesos[perfil],0);
  let r = Math.random()*total;
  for(const c of pool){ r -= c.pesos[perfil]; if(r<=0){ ultimoTexto=c.texto; return c; } }
  return pool[0];
}

async function sortear(perfil){
  if(API_BASE){
    try{
      const res = await fetch(`${API_BASE}/caixinha?perfil=${perfil}`);
      if(res.ok) return await res.json();
    }catch(e){ /* cai pro acervo local */ }
  }
  return sortearLocal(perfil);
}

/* ---------- UI ---------- */
const body=document.body, box=document.getElementById("box"), stage=document.getElementById("stage");
const reveal=document.getElementById("reveal"), hint=document.getElementById("hint");
const openBtn=document.getElementById("openBtn"), againBtn=document.getElementById("againBtn");
const rTag=document.getElementById("rTag"), rBody=document.getElementById("rBody"),
      rRef=document.getElementById("rRef"), rEmoji=document.getElementById("rEmoji");
let vibeAtual="serenidade", abrindo=false;

function aplicarAcento(v){
  const a=ACENTO[v];
  document.documentElement.style.setProperty("--accent",a.accent);
  document.documentElement.style.setProperty("--accent-ink",a.ink);
  body.dataset.vibe=v;
}
aplicarAcento(vibeAtual);

document.querySelectorAll(".vibe").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".vibe").forEach(b=>b.setAttribute("aria-pressed","false"));
    btn.setAttribute("aria-pressed","true");
    vibeAtual=btn.dataset.vibe; aplicarAcento(vibeAtual);
    resetar();
  });
});

const TAGS={versiculo:"Versículo",frase:"Frase",vibe:"Vibe do dia"};

function estourar(){
  const cores=[getComputedStyle(document.documentElement).getPropertyValue("--accent"),"#f6d99a","#fff","#ff7a6b","#6fe3c4"];
  for(let i=0;i<14;i++){
    const s=document.createElement("i"); s.className="spark";
    const ang=Math.random()*Math.PI*2, dist=60+Math.random()*90;
    s.style.setProperty("--dx",Math.cos(ang)*dist+"px");
    s.style.setProperty("--dy",Math.sin(ang)*dist+"px");
    s.style.background=cores[i%cores.length];
    stage.appendChild(s); setTimeout(()=>s.remove(),750);
  }
  stage.classList.add("burst"); setTimeout(()=>stage.classList.remove("burst"),60);
}

async function abrir(){
  if(abrindo) return; abrindo=true;
  openBtn.disabled=true;
  const item=await sortear(PERFIL[vibeAtual]);

  box.classList.add("opening");
  setTimeout(()=>{ box.classList.remove("opening"); box.classList.add("open"); estourar(); },380);

  setTimeout(()=>{
    reveal.className="reveal tipo-"+item.tipo+" show";
    rTag.textContent=TAGS[item.tipo]||"Surpresa";
    rBody.textContent=item.texto;
    if(item.emoji){ rEmoji.style.display="block"; rEmoji.textContent=item.emoji; }
    else rEmoji.style.display="none";
    if(item.ref){ rRef.style.display="block"; rRef.textContent="— "+item.ref; }
    else rRef.style.display="none";
    hint.style.visibility="hidden";
    openBtn.style.display="none"; againBtn.style.display="block";
    abrindo=false; openBtn.disabled=false;
  },820);
}

function resetar(){
  box.classList.remove("open","opening");
  reveal.className="reveal";
  hint.style.visibility="visible";
  openBtn.style.display="block"; openBtn.disabled=false;
  againBtn.style.display="none";
  abrindo=false;
}

openBtn.addEventListener("click",abrir);
againBtn.addEventListener("click",()=>{ resetar(); setTimeout(abrir,120); });
box.addEventListener("click",()=>{ if(!box.classList.contains("open")) abrir(); });
box.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();abrir();} });

document.getElementById("wa").addEventListener("click",e=>{
  e.preventDefault();
  // troque pelo número/fluxo da assinatura
  window.open("https://wa.me/5598984221002?text="+encodeURIComponent("Quero receber minha caixinha todo dia ✨"),"_blank");
});

/* estrelinhas */
const starsEl=document.getElementById("stars");
for(let i=0;i<26;i++){
  const s=document.createElement("i");
  s.style.left=Math.random()*100+"%"; s.style.top=Math.random()*100+"%";
  s.style.animationDelay=Math.random()*4+"s";
  starsEl.appendChild(s);
}
</script>
</body>
</html>
